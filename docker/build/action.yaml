name: "Build"
description: "Build image and push to GitHub Packages"
outputs:
  image:
    description: "Base image repository for the canonical tag"
    value: ${{ steps.derive-outputs.outputs.image }}
  tag:
    description: "Canonical first tag from normalized tags"
    value: ${{ steps.derive-outputs.outputs.tag }}
  tags:
    description: "Normalized newline-separated list of pushed tags"
    value: ${{ steps.derive-outputs.outputs.tags }}
  digest:
    description: "Image digest from docker/build-push-action"
    value: ${{ steps.derive-outputs.outputs.digest }}
  image-tag:
    description: "Canonical image reference in image:tag format"
    value: ${{ steps.derive-outputs.outputs.image-tag }}
  image-digest:
    description: "Canonical image reference in image@digest format when digest exists"
    value: ${{ steps.derive-outputs.outputs.image-digest }}
inputs:
  image-name:
    description: "Name of the Docker image"
    required: true
  dockerfile-path:
    description: "Path to the Dockerfile"
    required: false
    default: "Dockerfile"
  context:
    description: "Build Context"
    required: false
    default: "."
  build-args:
    description: 'Adds support for Dockerfile build arguments. Ex: "BUILD_UID=1001'
    required: false
    default: ""
  tag-latest:
    description: "Add latest for generated Docker Tag"
    required: false
    default: "auto"
  tag-prefix:
    description: "Add prefix for generated Docker Tag"
    required: false
    default: ""
  tag-prefix-latest:
    description: "Add prefix for latest Docker Tag"
    required: false
    default: "false"
  tag-suffix:
    description: "Add a suffix for generated Docker Tag"
    required: false
    default: ""
  tag-suffix-latest:
    description: "Add suffix for latest Docker Tag"
    required: false
    default: "false"
  github-token:
    description: "GitHub token"
    required: true
  registry:
    description: "GitHub Packages registry"
    required: false
    default: "ghcr.io"
  checkout:
    description: "Checkout code"
    required: false
    default: "true"
  tags:
    description: "Additional tags (newline separated)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Checkout code
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ inputs.registry }}/${{ inputs.image-name }}
        tags: |
          type=semver,pattern={{version}}
        flavor: |
          latest=${{ inputs.tag-latest }}
          prefix=${{ inputs.tag-prefix }},onlatest=${{ inputs.tag-prefix-latest }}
          suffix=${{ inputs.tag-suffix }},onlatest=${{ inputs.tag-suffix-latest }}

    - name: Build and push Docker image
      id: build-and-push
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile-path }}
        push: true
        tags: |
          ${{ inputs.tags != '' && inputs.tags || steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ inputs.registry }}/${{ inputs.image-name }}:cache
        cache-to: type=registry,mode=max,ref=${{ inputs.registry }}/${{ inputs.image-name }}:cache
        build-args: |
          ${{ inputs.build-args }}

    - name: Derive action outputs
      id: derive-outputs
      shell: bash
      env:
        INPUT_TAGS: ${{ inputs.tags }}
        META_TAGS: ${{ steps.meta.outputs.tags }}
        BUILD_DIGEST: ${{ steps.build-and-push.outputs.digest }}
      run: |
        set -euo pipefail

        normalized_tags="${INPUT_TAGS}"
        if [ -z "${normalized_tags}" ]; then
          normalized_tags="${META_TAGS}"
        fi

        normalized_tags="$(printf '%s\n' "${normalized_tags}" | sed '/^\s*$/d')"
        first_tag="$(printf '%s\n' "${normalized_tags}" | sed -n '1p')"

        image=""
        if [ -n "${first_tag}" ]; then
          image="${first_tag%:*}"
        fi

        digest="${BUILD_DIGEST}"
        image_tag=""
        image_digest=""

        if [ -n "${first_tag}" ]; then
          image_tag="${first_tag}"
        fi

        if [ -n "${image}" ] && [ -n "${digest}" ]; then
          image_digest="${image}@${digest}"
        fi

        {
          echo "tags<<EOF"
          printf '%s\n' "${normalized_tags}"
          echo "EOF"
          echo "tag=${first_tag}"
          echo "image=${image}"
          echo "digest=${digest}"
          echo "image-tag=${image_tag}"
          echo "image-digest=${image_digest}"
        } >> "${GITHUB_OUTPUT}"

    - name: Logout from GitHub Container Registry
      if: always()
      run: docker logout ${{ inputs.registry }}
      shell: bash
